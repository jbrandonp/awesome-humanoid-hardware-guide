name: CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  main:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Initialize Nx Cloud (if configured)
        run: |
          if [ -f "nx.json" ] && grep -q '"nxCloudAccessToken"' nx.json; then
            npx nx connect-to-nx-cloud --no-interactive
          else
            echo "Nx Cloud not configured, using local cache"
          fi

      - name: Restore Nx cache
        uses: actions/cache@v4
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('nx.json', '.nxignore', '**/package.json', '**/nx.json') }}
          restore-keys: |
            nx-${{ runner.os }}-

      - name: Lint affected projects
        run: npx nx affected --target=lint --parallel=3

      - name: Build affected projects
        run: npx nx affected --target=build --parallel=3

      - name: Test affected projects
        run: npx nx affected --target=test --parallel=3 --coverage

      - name: E2E tests for affected projects
        run: |
          if npx nx show projects | grep -q "e2e"; then
            npx nx affected --target=e2e --parallel=2
          else
            echo "No E2E projects found, skipping"
          fi

      - name: Upload coverage reports
        uses: codecov/codecov-action@v4
        with:
          directory: ./coverage
          flags: unittests
          name: codecov-umbrella
          fail_ci_if_error: false

  docker:
    runs-on: ubuntu-latest
    needs: main
    if: github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/develop')
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub (if secrets available)
        if: vars.DOCKERHUB_USERNAME != ''
        uses: docker/login-action@v3
        with:
          username: ${{ vars.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build and push API Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.api
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/healthcare-api:latest
            ${{ vars.DOCKERHUB_USERNAME }}/healthcare-api:${{ github.sha }}

      - name: Build and push Web Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/Dockerfile.web
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: |
            ${{ vars.DOCKERHUB_USERNAME }}/healthcare-web:latest
            ${{ vars.DOCKERHUB_USERNAME }}/healthcare-web:${{ github.sha }}

  deploy-preview:
    runs-on: ubuntu-latest
    needs: main
    if: github.event_name == 'pull_request'
    environment: preview
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Build all projects
        run: npx nx run-many --target=build --all

      - name: Deploy to preview environment
        run: echo "Preview deployment would happen here"
        # Example: vercel --prod --token=$VERCEL_TOKEN

  deploy-production:
    runs-on: ubuntu-latest
    needs: [main, docker]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    environment: production
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Deploy to production
        run: echo "Production deployment would happen here"
        # Add your deployment steps (e.g., kubectl, AWS, etc.)