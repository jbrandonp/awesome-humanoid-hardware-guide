version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: systeme-sante-postgres
    environment:
      POSTGRES_USER: medical_user
      POSTGRES_PASSWORD: medical_password
      POSTGRES_DB: medical_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U medical_user -d medical_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  mongodb:
    image: mongo:6
    container_name: systeme-sante-mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: mongo_admin
      MONGO_INITDB_ROOT_PASSWORD: mongo_password
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: always

  minio:
    image: minio/minio
    container_name: systeme-sante-minio
    environment:
      MINIO_ROOT_USER: minio_admin
      MINIO_ROOT_PASSWORD: minio_password
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - minio_data:/data
    command: server /data --console-address ":9001"
    restart: always

  redis:
    image: redis:7-alpine
    container_name: systeme-sante-redis
    ports:
      - "6379:6379"
    restart: always

  # --- PRODUCTION DEPLOYMENT ---
  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    container_name: systeme-sante-api
    depends_on:
      postgres:
        condition: service_healthy
      mongodb:
        condition: service_started
    environment:
      DATABASE_URL: postgresql://medical_user:medical_password@postgres:5432/medical_db?schema=public
      MONGO_URL: mongodb://mongo_admin:mongo_password@mongodb:27017/medical_db?authSource=admin
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: production-secret-key-change-me
      PORT: 3000
    restart: always

  nginx:
    image: nginx:alpine
    container_name: systeme-sante-proxy
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - api
    restart: always

volumes:
  postgres_data:
  mongodb_data:
  minio_data: