apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-deployment
  namespace: default
  labels:
    app: systeme-sante
    component: api
spec:
  replicas: 2
  selector:
    matchLabels:
      app: systeme-sante
      component: api
  template:
    metadata:
      labels:
        app: systeme-sante
        component: api
    spec:
      containers:
      - name: api
        image: systeme-sante/api:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3000
          name: http
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: systeme-sante-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: systeme-sante-config
              key: PORT
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: systeme-sante-secrets
              key: database-url
        - name: MONGO_URL
          valueFrom:
            secretKeyRef:
              name: systeme-sante-secrets
              key: mongo-url
        - name: REDIS_HOST
          value: "redis-service"
        - name: REDIS_PORT
          valueFrom:
            configMapKeyRef:
              name: systeme-sante-config
              key: REDIS_PORT
        - name: JWT_SECRET
          valueFrom:
            secretKeyRef:
              name: systeme-sante-secrets
              key: jwt-secret
        - name: JWT_REFRESH_SECRET
          valueFrom:
            secretKeyRef:
              name: systeme-sante-secrets
              key: jwt-refresh-secret
        - name: TOKEN_ENCRYPTION_KEY
          valueFrom:
            secretKeyRef:
              name: systeme-sante-secrets
              key: token-encryption-key
        resources:
          requests:
            memory: "256Mi"
            cpu: "250m"
          limits:
            memory: "512Mi"
            cpu: "500m"
        livenessProbe:
          httpGet:
            path: /api/health
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /api/health/ready
            port: 3000
          initialDelaySeconds: 30
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /api/health/startup
            port: 3000
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 30
        volumeMounts:
        - name: tmp
          mountPath: /tmp
      volumes:
      - name: tmp
        emptyDir: {}
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - systeme-sante
                - key: component
                  operator: In
                  values:
                  - api
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: api-service
  namespace: default
  labels:
    app: systeme-sante
    component: api
spec:
  selector:
    app: systeme-sante
    component: api
  ports:
  - port: 3000
    targetPort: 3000
    name: http
  type: ClusterIP