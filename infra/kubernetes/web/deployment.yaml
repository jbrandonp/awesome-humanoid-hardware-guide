apiVersion: apps/v1
kind: Deployment
metadata:
  name: web-deployment
  namespace: default
  labels:
    app: systeme-sante
    component: web
spec:
  replicas: 2
  selector:
    matchLabels:
      app: systeme-sante
      component: web
  template:
    metadata:
      labels:
        app: systeme-sante
        component: web
    spec:
      containers:
      - name: web
        image: systeme-sante/web:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 3001
          name: http
        env:
        - name: NODE_ENV
          valueFrom:
            configMapKeyRef:
              name: systeme-sante-config
              key: NODE_ENV
        - name: PORT
          valueFrom:
            configMapKeyRef:
              name: systeme-sante-config
              key: WEB_PORT
        resources:
          requests:
            memory: "128Mi"
            cpu: "100m"
          limits:
            memory: "256Mi"
            cpu: "250m"
        livenessProbe:
          httpGet:
            path: /health
            port: 3001
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3
        readinessProbe:
          httpGet:
            path: /
            port: 3001
          initialDelaySeconds: 5
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 3
        startupProbe:
          httpGet:
            path: /health/startup
            port: 3001
          initialDelaySeconds: 10
          periodSeconds: 10
          failureThreshold: 30
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution:
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchExpressions:
                - key: app
                  operator: In
                  values:
                  - systeme-sante
                - key: component
                  operator: In
                  values:
                  - web
              topologyKey: kubernetes.io/hostname
---
apiVersion: v1
kind: Service
metadata:
  name: web-service
  namespace: default
  labels:
    app: systeme-sante
    component: web
spec:
  selector:
    app: systeme-sante
    component: web
  ports:
  - port: 3001
    targetPort: 3001
    name: http
  type: ClusterIP