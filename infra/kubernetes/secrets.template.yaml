apiVersion: v1
kind: Secret
metadata:
  name: systeme-sante-secrets
  namespace: default
  labels:
    app: systeme-sante
    component: secrets
type: Opaque
stringData:
  # PostgreSQL credentials
  postgres-user: "medical_user"
  postgres-password: "CHANGE_ME_SECURE_PASSWORD"
  
  # MongoDB credentials
  mongo-root-username: "mongo_admin"
  mongo-root-password: "CHANGE_ME_SECURE_PASSWORD"
  
  # MinIO credentials
  minio-root-user: "minio_admin"
  minio-root-password: "CHANGE_ME_SECURE_PASSWORD"
  
  # JWT secrets (must be at least 32 bytes base64)
  jwt-secret: "CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_BASE64_32"
  jwt-refresh-secret: "CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_BASE64_32"
  token-encryption-key: "CHANGE_ME_GENERATE_WITH_OPENSSL_RAND_BASE64_32"
  
  # External API keys
  deepseek-api-key: "CHANGE_ME_DEEPSEEK_API_KEY"
  abdm-client-id: "CHANGE_ME_ABDM_CLIENT_ID"
  abdm-client-secret: "CHANGE_ME_ABDM_CLIENT_SECRET"
  whatsapp-business-access-token: "CHANGE_ME_WHATSAPP_ACCESS_TOKEN"
  whatsapp-business-phone-number-id: "CHANGE_ME_WHATSAPP_PHONE_ID"
  
  # Database URLs (with embedded secrets)
  database-url: "postgresql://medical_user:CHANGE_ME_SECURE_PASSWORD@postgres-service:5432/medical_db?schema=public"
  mongo-url: "mongodb://mongo_admin:CHANGE_ME_SECURE_PASSWORD@mongodb-service:27017/medical_db?authSource=admin"
  redis-url: "redis://redis-service:6379"