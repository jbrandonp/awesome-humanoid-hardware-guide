apiVersion: v1
kind: ConfigMap
metadata:
  name: nginx-config
  namespace: default
  labels:
    app: systeme-sante
    component: nginx
data:
  nginx.conf: |
    events {
        worker_connections 1024;
    }

    http {
        # Rate limiting zones
        limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
        limit_req_zone $binary_remote_addr zone=web:10m rate=100r/s;

        # WebSocket/SSE mapping
        map $http_upgrade $connection_upgrade {
            default upgrade;
            ''      '';
        }

        upstream backend_api {
            server api-service:3000;
        }

        upstream frontend_web {
            server web-service:3001;
        }

        server {
            listen 80;
            server_name _;

            # Security headers (OWASP)
            add_header X-Frame-Options "SAMEORIGIN";
            add_header X-Content-Type-Options "nosniff";
            add_header X-XSS-Protection "1; mode=block";
            add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
            add_header Referrer-Policy "strict-origin-when-cross-origin";

            # Hide nginx version
            server_tokens off;

            # Health check endpoint (no rate limiting)
            location /health {
                access_log off;
                return 200 "healthy\n";
                add_header Content-Type text/plain;
            }

            # API routes
            location /api/ {
                limit_req zone=api burst=20 nodelay;
                proxy_pass http://backend_api;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # WebSocket and SSE support
                proxy_http_version 1.1;
                proxy_set_header Upgrade $http_upgrade;
                proxy_set_header Connection $connection_upgrade;
                proxy_read_timeout 3600s; # Reduced from 24h to 1h for security
                proxy_send_timeout 3600s;

                # Buffer settings
                proxy_buffering off;
                proxy_cache off;
                chunked_transfer_encoding off;
            }

            # PWA (Patient Portal) - everything else
            location / {
                limit_req zone=web burst=50 nodelay;
                proxy_pass http://frontend_web;
                proxy_set_header Host $host;
                proxy_set_header X-Real-IP $remote_addr;
                proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
                proxy_set_header X-Forwarded-Proto $scheme;

                # Cache static assets
                location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
                    expires 1y;
                    add_header Cache-Control "public, immutable";
                    proxy_pass http://frontend_web;
                }
            }
        }
    }