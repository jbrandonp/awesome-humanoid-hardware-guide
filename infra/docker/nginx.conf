events {
    worker_connections 1024;
}

http {
    # Mappage pour le support conditionnel des WebSockets / SSE
    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      '';
    }

    upstream backend_api {
        server api:3000;
    }

    server {
        listen 80;
        server_name _;

        # Sécurisation des headers HTTP (OWASP)
        add_header X-Frame-Options "SAMEORIGIN";
        add_header X-Content-Type-Options "nosniff";
        add_header X-XSS-Protection "1";
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;

        # Masquer la version Nginx
        server_tokens off;

        location /api/ {
            proxy_pass http://backend_api;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;

            # Support des WebSockets (Kiosk) et Server-Sent Events (Ticker)
            proxy_http_version 1.1;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection $connection_upgrade;

            chunked_transfer_encoding off;
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 24h; # Garder la connexion ouverte
        }

        # Refuser tout accès non API
        location / {
            return 403;
        }
    }
}
